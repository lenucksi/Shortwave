name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run prek hooks
        uses: j178/prek-action@bdca6f102f98e2b4c7029491a53dfd366469e33d # v2.0.4

  conventional-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Check conventional commits
        uses: cocogitto/cocogitto-action@52d0023b4396897f1815648e553db2ab8d782f3a # v4.2.0
        with:
          command: check
          args: --from-latest-tag

  build-test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Cache Flatpak builder state
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .flatpak-builder
          key: flatpak-builder-${{ hashFiles('build-aux/de.haeckerfelix.Shortwave.Devel.json') }}-${{ runner.arch }}
          restore-keys: |
            flatpak-builder-
      - name: Bootstrap Flatpak SDK
        run: |
          flatpak-builder \
            --disable-rofiles-fuse --keep-build-dirs \
            --state-dir=.flatpak-builder \
            --install-deps-from=flathub \
            --stop-at=shortwave \
            flatpak_app \
            build-aux/de.haeckerfelix.Shortwave.Devel.json
          flatpak build-finish --share=network flatpak_app
      - name: Cargo build
        run: |
          echo "cd .. && cargo build" | \
            flatpak-builder --disable-rofiles-fuse \
              --state-dir=.flatpak-builder \
              --build-shell=shortwave \
              flatpak_app \
              build-aux/de.haeckerfelix.Shortwave.Devel.json
      - name: Cargo test
        run: |
          echo "cd .. && cargo test" | \
            flatpak-builder --disable-rofiles-fuse \
              --state-dir=.flatpak-builder \
              --build-shell=shortwave \
              flatpak_app \
              build-aux/de.haeckerfelix.Shortwave.Devel.json

  lint:
    needs: build-test
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Restore Flatpak builder state
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .flatpak-builder
          key: flatpak-builder-${{ hashFiles('build-aux/de.haeckerfelix.Shortwave.Devel.json') }}-${{ runner.arch }}
          restore-keys: |
            flatpak-builder-
      - name: Bootstrap Flatpak SDK
        run: |
          flatpak-builder \
            --disable-rofiles-fuse --keep-build-dirs \
            --state-dir=.flatpak-builder \
            --install-deps-from=flathub \
            --stop-at=shortwave \
            flatpak_app \
            build-aux/de.haeckerfelix.Shortwave.Devel.json
          flatpak build-finish --share=network flatpak_app
      - name: Cargo fmt
        run: |
          echo "cd .. && cargo fmt --all --check" | \
            flatpak-builder --disable-rofiles-fuse \
              --state-dir=.flatpak-builder \
              --build-shell=shortwave \
              flatpak_app \
              build-aux/de.haeckerfelix.Shortwave.Devel.json
      - name: Cargo clippy
        run: |
          echo "cd .. && cargo clippy --all -- -D warnings" | \
            flatpak-builder --disable-rofiles-fuse \
              --state-dir=.flatpak-builder \
              --build-shell=shortwave \
              flatpak_app \
              build-aux/de.haeckerfelix.Shortwave.Devel.json
      - name: Flatpak lint
        run: |
          flatpak-builder-lint manifest build-aux/de.haeckerfelix.Shortwave.Devel.json

  deny:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Check advisories and licenses
        run: cargo deny check advisories licenses

  update-cargo-sources:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Fetch main branch
        run: git fetch origin main
      - name: Check Cargo.lock changed
        id: diff
        run: |
          if git diff --name-only origin/main..HEAD | grep -q Cargo.lock; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Generate vendored sources
        if: steps.diff.outputs.changed == 'true'
        run: |
          git clone --depth 1 https://github.com/flatpak/flatpak-builder-tools.git
          python3 flatpak-builder-tools/cargo/flatpak-cargo-generator.py \
            Cargo.lock -o build-aux/generated-sources.json
      - name: Commit generated-sources.json
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build-aux/generated-sources.json
          if git commit -m "chore: update generated-sources.json for vendored cargo deps"; then
            git push
          else
            echo "Nothing to commit"
          fi
