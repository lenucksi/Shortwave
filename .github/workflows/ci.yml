name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run prek hooks
        uses: j178/prek-action@bdca6f102f98e2b4c7029491a53dfd366469e33d # v2.0.4

  conventional-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Check conventional commits
        uses: cocogitto/cocogitto-action@52d0023b4396897f1815648e553db2ab8d782f3a # v4.2.0
        with:
          command: check
          args: --from-latest-tag

  build-test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50@sha256:582e06f9906d4569a12ee21b33bc829b68d38391bacef2fcd0c5c651cfe01bcb
      options: --privileged
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Flatpak builder state
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: .flatpak-builder
          key: flatpak-builder-${{ hashFiles('build-aux/de.haeckerfelix.Shortwave.Devel.json') }}-${{ runner.arch }}
          restore-keys: |
            flatpak-builder-
      - name: Bootstrap Flatpak SDK
        run: |
          flatpak-builder \
            --disable-rofiles-fuse --keep-build-dirs \
            --state-dir=.flatpak-builder \
            --install-deps-from=flathub \
            --stop-at=shortwave \
            flatpak_app \
            build-aux/de.haeckerfelix.Shortwave.Devel.json
          flatpak build-finish --share=network flatpak_app
      - name: Restore cargo cache
        run: |
          if [ -d .flatpak-builder/cargo-home ]; then
            mkdir -p .flatpak-builder/build/shortwave/run/build/shortwave
            cp -r .flatpak-builder/cargo-home .flatpak-builder/build/shortwave/run/build/shortwave/.cargo-home
          fi
      - name: Cargo build
        run: |
          echo "export CARGO_HOME=/run/build/shortwave/.cargo-home && cd .. && cargo build" | \
            flatpak-builder --disable-rofiles-fuse \
              --state-dir=.flatpak-builder \
              --build-shell=shortwave \
              flatpak_app \
              build-aux/de.haeckerfelix.Shortwave.Devel.json
      - name: Cargo test
        run: |
          echo "export CARGO_HOME=/run/build/shortwave/.cargo-home && cd .. && cargo test" | \
            flatpak-builder --disable-rofiles-fuse \
              --state-dir=.flatpak-builder \
              --build-shell=shortwave \
              flatpak_app \
              build-aux/de.haeckerfelix.Shortwave.Devel.json
      - name: Save cargo cache
        run: |
          DIR=$(ls -d .flatpak-builder/build/shortwave-* 2>/dev/null | sort -V | tail -1)
          if [ -n "$DIR" ] && [ -d "$DIR/run/build/shortwave/.cargo-home" ]; then
            rm -rf .flatpak-builder/cargo-home
            cp -r "$DIR/run/build/shortwave/.cargo-home" .flatpak-builder/cargo-home
          fi

  lint:
    needs: build-test
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50@sha256:582e06f9906d4569a12ee21b33bc829b68d38391bacef2fcd0c5c651cfe01bcb
      options: --privileged
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Restore Flatpak builder state
        uses: actions/cache/restore@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: .flatpak-builder
          key: flatpak-builder-${{ hashFiles('build-aux/de.haeckerfelix.Shortwave.Devel.json') }}-${{ runner.arch }}
          restore-keys: |
            flatpak-builder-
      - name: Bootstrap Flatpak SDK
        run: |
          flatpak-builder \
            --disable-rofiles-fuse --keep-build-dirs \
            --state-dir=.flatpak-builder \
            --install-deps-from=flathub \
            --stop-at=shortwave \
            flatpak_app \
            build-aux/de.haeckerfelix.Shortwave.Devel.json
          flatpak build-finish --share=network flatpak_app
      - name: Restore cargo cache
        run: |
          if [ -d .flatpak-builder/cargo-home ]; then
            mkdir -p .flatpak-builder/build/shortwave/run/build/shortwave
            cp -r .flatpak-builder/cargo-home .flatpak-builder/build/shortwave/run/build/shortwave/.cargo-home
          fi
      - name: Cargo fmt
        run: |
          echo "export CARGO_HOME=/run/build/shortwave/.cargo-home && cd .. && cargo fmt --all --check" | \
            flatpak-builder --disable-rofiles-fuse \
              --state-dir=.flatpak-builder \
              --build-shell=shortwave \
              flatpak_app \
              build-aux/de.haeckerfelix.Shortwave.Devel.json
      - name: Cargo clippy
        run: |
          echo "export CARGO_HOME=/run/build/shortwave/.cargo-home && cd .. && cargo clippy --all -- -D warnings" | \
            flatpak-builder --disable-rofiles-fuse \
              --state-dir=.flatpak-builder \
              --build-shell=shortwave \
              flatpak_app \
              build-aux/de.haeckerfelix.Shortwave.Devel.json
      - name: Flatpak lint
        run: |
          flatpak-builder-lint manifest build-aux/de.haeckerfelix.Shortwave.Devel.json

  build-release:
    needs: build-test
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50@sha256:582e06f9906d4569a12ee21b33bc829b68d38391bacef2fcd0c5c651cfe01bcb
      options: --privileged
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Restore Flatpak builder state
        uses: actions/cache/restore@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: .flatpak-builder
          key: flatpak-builder-${{ hashFiles('build-aux/de.haeckerfelix.Shortwave.Devel.json') }}-${{ runner.arch }}
          restore-keys: |
            flatpak-builder-
      - name: Bootstrap Flatpak SDK
        run: |
          flatpak-builder \
            --disable-rofiles-fuse --keep-build-dirs \
            --state-dir=.flatpak-builder \
            --install-deps-from=flathub \
            --stop-at=shortwave \
            flatpak_app \
            build-aux/de.haeckerfelix.Shortwave.Devel.json
          flatpak build-finish --share=network flatpak_app
      - name: Restore cargo cache
        run: |
          if [ -d .flatpak-builder/cargo-home ]; then
            mkdir -p .flatpak-builder/build/shortwave/run/build/shortwave
            cp -r .flatpak-builder/cargo-home .flatpak-builder/build/shortwave/run/build/shortwave/.cargo-home
          fi
      - name: Cargo build (release)
        run: |
          echo "export CARGO_HOME=/run/build/shortwave/.cargo-home && cd .. && cargo build --release" | \
            flatpak-builder --disable-rofiles-fuse \
              --state-dir=.flatpak-builder \
              --build-shell=shortwave \
              flatpak_app \
              build-aux/de.haeckerfelix.Shortwave.Devel.json
      - name: Cargo test (release)
        run: |
          echo "export CARGO_HOME=/run/build/shortwave/.cargo-home && cd .. && cargo test --release" | \
            flatpak-builder --disable-rofiles-fuse \
              --state-dir=.flatpak-builder \
              --build-shell=shortwave \
              flatpak_app \
              build-aux/de.haeckerfelix.Shortwave.Devel.json
      - name: Save cargo cache
        run: |
          DIR=$(ls -d .flatpak-builder/build/shortwave-* 2>/dev/null | sort -V | tail -1)
          if [ -n "$DIR" ] && [ -d "$DIR/run/build/shortwave/.cargo-home" ]; then
            rm -rf .flatpak-builder/cargo-home
            cp -r "$DIR/run/build/shortwave/.cargo-home" .flatpak-builder/cargo-home
          fi

  deny:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Check advisories and licenses
        run: cargo deny check advisories licenses

  update-cargo-sources:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Fetch main branch
        run: git fetch origin main
      - name: Check Cargo.lock changed
        id: diff
        run: |
          if git diff --name-only origin/main..HEAD | grep -q Cargo.lock; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Generate vendored sources
        if: steps.diff.outputs.changed == 'true'
        run: |
          git clone --depth 1 https://github.com/flatpak/flatpak-builder-tools.git
          python3 flatpak-builder-tools/cargo/flatpak-cargo-generator.py \
            Cargo.lock -o build-aux/generated-sources.json
      - name: Commit generated-sources.json
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build-aux/generated-sources.json
          if git commit -m "chore: update generated-sources.json for vendored cargo deps"; then
            git push
          else
            echo "Nothing to commit"
          fi
